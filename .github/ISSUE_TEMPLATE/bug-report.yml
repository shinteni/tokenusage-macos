name: Bug report
description: Report a reproducible problem in TokenUsage.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve TokenUsage. Remove API keys, tokens, account details, prompts, and sensitive file paths before submitting.
  - type: input
    id: version
    attributes:
      label: TokenUsage version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac architecture
      placeholder: macOS 15.5, Apple silicon
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Antigravity
        - Claude
        - Codex
        - GitHub Copilot
        - Cursor
        - Devin
        - Grok
        - OpenRouter
        - Z.AI
        - General interface
        - Other
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Explain the smallest sequence that consistently reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: redaction
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets and personal or account information from this report.
          required: true
